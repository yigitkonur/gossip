version: 2

project_name: agentbridge

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: agentbridge
    main: ./cmd/agentbridge
    binary: agentbridge
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "agentbridge_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'

release:
  draft: false
