name: CI
on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go mod tidy -diff
      - run: go vet ./...
      - run: go test -race -count=1 ./...
      - run: go build -trimpath -o bin/gossip ./cmd/gossip
