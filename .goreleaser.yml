version: 2

project_name: gossip

before:
  hooks:
    - go mod tidy

builds:
  - id: gossip
    main: ./cmd/gossip
    binary: gossip
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version=v{{.Version}}

archives:
  - id: gossip
    # Matches install.sh: gossip_<version>_<os>_<arch>.tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE
      # Ship the plugin bundle under share/gossip/plugins/gossip/ so install.sh
      # can drop it next to the binary. We pass the directory as src (no glob)
      # and let goreleaser copy the subtree, preserving subdirs like
      # .claude-plugin/ and commands/. The prior `src: plugins/gossip/**/*`
      # with strip_parent: true flattened the tree and broke the layout.
      - src: plugins/gossip
        dst: share/gossip/plugins/gossip

checksum:
  # install.sh fetches checksums.txt alongside the archives.
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Refactors
      regexp: "^.*refactor[(\\w)]*:+.*$"
      order: 2
    - title: Others
      order: 999

release:
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## Install

    ```bash
    curl -fsSL https://raw.githubusercontent.com/yigitkonur/gossip/master/install.sh | sudo bash
    ```

    Or grab a binary below.
